<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <circle cx="256" cy="256" r="240" fill="#2d2d3d"/>

  <!-- Orca: local space ~600x230, head right, rotated -35° into badge -->
  <g transform="translate(258 264) rotate(-35) scale(0.58) translate(-298 -128)">

    <!-- Body - elongated, blunt head, flat back, rounded belly, narrow tail stock -->
    <path d="
      M 572 130
      C 575 110, 562 92, 548 82
      C 525 68, 495 62, 465 60
      C 405 54, 345 58, 285 68
      C 220 80, 155 98, 105 115
      C 70 128, 48 135, 34 138
      C 24 140, 20 138, 20 135
      C 20 138, 24 142, 34 144
      C 48 150, 70 158, 105 172
      C 155 192, 220 206, 285 216
      C 345 224, 405 226, 465 218
      C 495 214, 525 206, 548 192
      C 562 180, 575 162, 575 148
      C 575 140, 574 134, 572 130Z
    " fill="#63d0df"/>

    <!-- Dorsal fin - tall, triangular, swept back -->
    <path d="
      M 300 72
      C 312 38, 340 2, 368 -10
      C 378 -14, 385 -6, 382 8
      C 378 34, 368 54, 358 64
      C 345 72, 328 75, 300 72Z
    " fill="#63d0df"/>

    <!-- Belly patch - lighter underside -->
    <path d="
      M 570 142
      C 565 162, 548 185, 520 200
      C 480 218, 420 226, 355 224
      C 280 218, 210 204, 148 186
      C 100 170, 62 155, 40 146
      C 30 142, 24 140, 26 138
      C 38 142, 62 152, 100 166
      C 148 182, 210 198, 280 212
      C 355 222, 420 224, 480 216
      C 520 210, 548 195, 565 178
      C 572 165, 574 152, 572 145Z
    " fill="#4ab8c7"/>

    <!-- Tail flukes - spread fan shape -->
    <path d="M 22 132 C 6 118, -14 104, -18 114 C -20 124, -4 132, 14 131Z" fill="#63d0df"/>
    <path d="M 22 142 C 6 156, -14 170, -18 160 C -20 150, -4 142, 14 143Z" fill="#63d0df"/>

    <!-- Eye patch - white oval behind the eye -->
    <ellipse cx="520" cy="88" rx="26" ry="13" transform="rotate(10 520 88)" fill="#ffffff"/>

    <!-- Eye -->
    <circle cx="540" cy="84" r="5" fill="#2d2d3d"/>

    <!-- Mouth line -->
    <path d="M 570 138 C 575 152, 574 168, 568 182" stroke="#2d2d3d" stroke-width="3.5" fill="none" stroke-linecap="round"/>

    <!-- Pectoral flipper -->
    <path d="M 435 204 C 420 226, 406 232, 402 228 C 398 224, 410 208, 425 196Z" fill="#509eab"/>

    <!-- Baton - from flipper across body -->
    <line x1="428" y1="206" x2="280" y2="5" stroke="#ffffff" stroke-width="9" stroke-linecap="round"/>
    <circle cx="278" cy="3" r="9" fill="#ffffff"/>
  </g>
</svg>
