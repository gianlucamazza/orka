[advisories]
unmaintained = "workspace"
ignore = [
  # tokio-tar 0.3.1 (archived, no fix): transitive dev-dep via testcontainers.
  # Waiting on testcontainers to switch to astral-tokio-tar or similar.
  "RUSTSEC-2025-0111",
]

[licenses]
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "CC0-1.0",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "BSL-1.0",
  "NCSA",
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
