# Cargo Deny Configuration v2
# https://embarkstudios.github.io/cargo-deny/

[graph]
targets = [
  { triple = "x86_64-unknown-linux-gnu" },
  { triple = "x86_64-unknown-linux-musl" },
  { triple = "aarch64-unknown-linux-gnu" },
]

[advisories]
version = 2
yanked = "deny"
unmaintained = "none"
# tokio-tar CVE (RUSTSEC-2025-0111): dev-only dependency via testcontainers;
# not present in production binaries. No fixed version available upstream.
ignore = ["RUSTSEC-2025-0111"]

[licenses]
version = 2
allow = [
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "MIT",
  "MIT-0",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unlicense",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
  "CDLA-Permissive-2.0",
  "LicenseRef-ring",
  # ansi_colours (via viuer in orka-cli) — LGPL is acceptable for a CLI tool
  "LGPL-3.0-or-later",
]

[[licenses.clarify]]
name = "ring"
expression = "LicenseRef-ring"
license-files = [{ path = "LICENSE", hash = 0xbd0eed23 }]

[[licenses.clarify]]
name = "webpki"
expression = "ISC"
license-files = [{ path = "LICENSE", hash = 0x001c7e6c }]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"

skip = [
  { name = "bitflags", version = "1.3.2" },
  { name = "hashbrown", version = "0.12.3" },
  { name = "indexmap", version = "1.9.3" },
  { name = "syn", version = "1.0.109" },
  { name = "windows-sys", version = "0.48.0" },
  { name = "windows-targets", version = "0.48.5" },
  { name = "windows_aarch64_gnullvm", version = "0.48.5" },
  { name = "windows_aarch64_msvc", version = "0.48.5" },
  { name = "windows_i686_gnu", version = "0.48.5" },
  { name = "windows_i686_msvc", version = "0.48.5" },
  { name = "windows_x86_64_gnu", version = "0.48.5" },
  { name = "windows_x86_64_gnullvm", version = "0.48.5" },
  { name = "windows_x86_64_msvc", version = "0.48.5" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
