[advisories]
unmaintained = "workspace"
ignore = [
  # tokio-tar 0.3.1 (archived, no fix): transitive dev-dep via testcontainers.
  # Waiting on testcontainers to switch to astral-tokio-tar or similar.
  "RUSTSEC-2025-0111",
]

[licenses]
allow = [
  "MIT",
  "MIT-0",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "CC0-1.0",
  "Unicode-3.0",
  "Zlib",
  "MPL-2.0",
  "BSL-1.0",
  "NCSA",
  "CDLA-Permissive-2.0",
]

[bans]
multiple-versions = "deny"
wildcards = "allow"
skip = [
  # axum 0.7 pulled by tonic (qdrant-client, opentelemetry-otlp)
  { name = "axum" },
  { name = "axum-core" },
  { name = "matchit" },
  { name = "tower" },
  # base64 pulled by multiple unrelated transitive deps
  { name = "base64" },
  # bitflags 1.x still used by inotify/kqueue/redox_syscall
  { name = "bitflags" },
  # various crates with multiple versions in transitive dep trees
  { name = "bit-set" },
  { name = "bit-vec" },
  { name = "convert_case" },
  { name = "core-foundation" },
  { name = "derive_more" },
  { name = "fancy-regex" },
  { name = "foldhash" },
  { name = "getrandom" },
  { name = "hashbrown" },
  { name = "indexmap" },
  { name = "itertools" },
  { name = "linux-raw-sys" },
  { name = "nom" },
  { name = "phf" },
  { name = "phf_shared" },
  { name = "rand" },
  { name = "rand_chacha" },
  { name = "rand_core" },
  { name = "rand_xoshiro" },
  { name = "redox_users" },
  { name = "r-efi" },
  { name = "rustc-hash" },
  { name = "rustix" },
  { name = "serde_spanned" },
  { name = "socket2" },
  { name = "thiserror" },
  { name = "thiserror-impl" },
  { name = "tiktoken-rs" },
  { name = "tokio-tungstenite" },
  { name = "toml" },
  { name = "toml_datetime" },
  { name = "tungstenite" },
  { name = "unicode-width" },
  { name = "ureq" },
  { name = "wasm-encoder" },
  { name = "wast" },
  { name = "webpki-roots" },
  { name = "windows-core" },
  { name = "windows-implement" },
  { name = "windows-interface" },
  { name = "windows-result" },
  { name = "windows-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
