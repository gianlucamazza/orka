[package]
name = "orka-server"
description = "Orka server binary (composition root)"
version.workspace = true
edition.workspace = true
license.workspace = true

[[bin]]
name = "orka-server"
path = "src/main.rs"

[lib]
name = "orka_server"
path = "src/lib.rs"

[features]
default = [
  "telegram",
  "discord",
  "slack",
  "whatsapp",
  "wasm",
  "local-embeddings",
]
## Enable local embedding models (ONNX Runtime, not available on all platforms).
local-embeddings = ["orka-knowledge/local-embeddings"]
## Enable the Telegram bot adapter.
telegram = ["dep:orka-adapter-telegram"]
## Enable the Discord bot adapter.
discord = ["dep:orka-adapter-discord"]
## Enable the Slack Events API adapter.
slack = ["dep:orka-adapter-slack"]
## Enable the WhatsApp Cloud API adapter.
whatsapp = ["dep:orka-adapter-whatsapp"]
## Enable the WASM plugin runtime (wasmtime).
wasm = ["dep:orka-wasm", "orka-skills/wasm", "orka-sandbox/wasm"]

[dependencies]
orka-core.workspace = true
orka-bus.workspace = true
orka-session.workspace = true
orka-queue.workspace = true
orka-gateway.workspace = true
orka-worker.workspace = true
orka-workspace.workspace = true
orka-auth.workspace = true
orka-adapter-custom.workspace = true
orka-adapter-telegram = { workspace = true, optional = true }
orka-adapter-discord = { workspace = true, optional = true }
orka-adapter-slack = { workspace = true, optional = true }
orka-adapter-whatsapp = { workspace = true, optional = true }
orka-memory.workspace = true
orka-secrets.workspace = true
orka-observe.workspace = true
orka-skills.workspace = true
orka-circuit-breaker.workspace = true
orka-sandbox.workspace = true
orka-wasm = { workspace = true, optional = true }
orka-llm.workspace = true
orka-mcp.workspace = true
orka-guardrails.workspace = true
orka-web.workspace = true
orka-os.workspace = true
orka-a2a.workspace = true
orka-http.workspace = true
orka-knowledge.workspace = true
orka-experience.workspace = true
orka-agent.workspace = true
orka-checkpoint.workspace = true
orka-scheduler.workspace = true
orka-eval.workspace = true
orka-git.workspace = true
orka-chart.workspace = true
orka-research.workspace = true
tokio-stream.workspace = true
axum.workspace = true
tower.workspace = true
tower-http.workspace = true
http.workspace = true
tokio.workspace = true
tokio-util.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
anyhow.workspace = true
serde.workspace = true
serde_json.workspace = true
uuid.workspace = true
chrono.workspace = true
cron.workspace = true
redis.workspace = true
reqwest = { workspace = true, features = ["json"] }
qdrant-client.workspace = true
utoipa.workspace = true
utoipa-swagger-ui.workspace = true
async-trait.workspace = true
dotenvy.workspace = true
notify.workspace = true
arc-swap.workspace = true
mimalloc = { version = "0.1", default-features = false }
sd-notify = "0.4"

[dev-dependencies]
orka-core.workspace = true
orka-gateway.workspace = true
orka-worker.workspace = true
orka-skills.workspace = true
orka-agent.workspace = true
orka-workspace.workspace = true
orka-research.workspace = true
orka-adapter-custom.workspace = true
tokio = { workspace = true, features = [
  "test-util",
  "macros",
  "rt-multi-thread",
] }
tower = { workspace = true, features = ["util"] }
tokio-tungstenite = { workspace = true }
futures-util.workspace = true
sha2.workspace = true
async-trait.workspace = true

[lints]
workspace = true
