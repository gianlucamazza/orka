---
kind: pipeline
type: docker
name: orka-ci

platform:
  os: linux
  arch: arm64

# ---------- shared volumes for Cargo caching ----------
volumes:
  - name: cargo-registry
    host:
      path: /home/gmazza/cache/drone-cargo/registry
  - name: cargo-git
    host:
      path: /home/gmazza/cache/drone-cargo/git
  - name: cargo-target
    host:
      path: /home/gmazza/cache/drone-cargo/target
  - name: cargo-bin
    host:
      path: /home/gmazza/cache/drone-cargo/bin
  - name: docker-sock
    host:
      path: /var/run/docker.sock

# ---------- services ----------
services:
  - name: redis
    image: redis:7-alpine
    commands:
      - redis-server --requirepass orka-ci

# ---------- pipeline steps ----------
steps:
  # ---- 1. Lint: fmt + clippy ----
  - name: lint
    image: rust:1.93-slim-bookworm
    volumes:
      - name: cargo-registry
        path: /usr/local/cargo/registry
      - name: cargo-git
        path: /usr/local/cargo/git
      - name: cargo-target
        path: /drone/src/target
    commands:
      - rustup component add rustfmt clippy
      - cargo fmt --all -- --check
      - cargo clippy --workspace --all-targets -- -D warnings

  # ---- 2. Test: unit tests (skip integration) ----
  - name: test
    image: rust:1.93-slim-bookworm
    volumes:
      - name: cargo-registry
        path: /usr/local/cargo/registry
      - name: cargo-git
        path: /usr/local/cargo/git
      - name: cargo-target
        path: /drone/src/target
    environment:
      REDIS_URL: redis://:orka-ci@redis:6379
    commands:
      - apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev && rm -rf /var/lib/apt/lists/*
      - cargo test --workspace
    depends_on:
      - lint

  # ---- 3. Integration tests (Redis-dependent, #[ignore] tests) ----
  - name: integration
    image: rust:1.93-slim-bookworm
    volumes:
      - name: cargo-registry
        path: /usr/local/cargo/registry
      - name: cargo-git
        path: /usr/local/cargo/git
      - name: cargo-target
        path: /drone/src/target
    environment:
      REDIS_URL: redis://:orka-ci@redis:6379
    commands:
      - apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev && rm -rf /var/lib/apt/lists/*
      - cargo test --workspace -- --ignored
    depends_on:
      - test

  # ---- 4. Security audit ----
  - name: audit
    image: rust:1.93-slim-bookworm
    volumes:
      - name: cargo-registry
        path: /usr/local/cargo/registry
      - name: cargo-git
        path: /usr/local/cargo/git
      - name: cargo-bin
        path: /usr/local/cargo/bin
    commands:
      - which cargo-audit || cargo install cargo-audit --locked
      - which cargo-deny || cargo install cargo-deny --locked
      - cargo audit
      - cargo deny check
    depends_on:
      - lint

  # ---- 5. Docker build + push ----
  - name: docker
    image: plugins/docker
    daemon_off: true
    settings:
      repo: 127.0.0.1:5000/gmazza/orka
      registry: 127.0.0.1:5000
      tags:
        - latest
        - ${DRONE_COMMIT_SHA:0:8}
      username:
        from_secret: docker_username
      password:
        from_secret: docker_password
      insecure: true
      build_args:
        - BUILD_DATE=${DRONE_BUILD_CREATED}
        - VCS_REF=${DRONE_COMMIT_SHA:0:8}
        - VERSION=${DRONE_TAG:-dev}
      cache_from:
        - 127.0.0.1:5000/gmazza/orka:latest
    depends_on:
      - test
      - audit
    when:
      branch:
        - main
      event:
        - push

  # ---- 6. Deploy (restart via docker socket — no SSH needed) ----
  - name: deploy
    image: docker:27-cli
    volumes:
      - name: docker-sock
        path: /var/run/docker.sock
    commands:
      - docker pull 127.0.0.1:5000/gmazza/orka:latest
      - |
        if [ -f /opt/orka/docker-compose.yml ]; then
          cd /opt/orka && docker compose up -d orka-server
        else
          docker rm -f orka-server 2>/dev/null || true
          docker run -d --restart unless-stopped --name orka-server 127.0.0.1:5000/gmazza/orka:latest
        fi
    depends_on:
      - docker
    when:
      branch:
        - main
      event:
        - push

# ---------- secrets (set via Drone CLI) ----------
# drone secret add --repository gmazza/orka --name docker_username --data gmazza
# drone secret add --repository gmazza/orka --name docker_password --data <registry-pass>

---
