    host:
      path: /home/gmazza/cache/drone-cargo/target-pr

services:
  - name: redis
    image: redis:7-alpine
    commands:
      - redis-server --requirepass orka-ci

trigger:
  event:
    - pull_request

steps:
  - name: lint
    image: rust:1.93-slim-bookworm
    volumes:
      - name: cargo-registry
        path: /usr/local/cargo/registry
      - name: cargo-git
        path: /usr/local/cargo/git
      - name: cargo-target
        path: /drone/src/target
    commands:
      - rustup component add rustfmt clippy
      - cargo fmt --all -- --check
      - cargo clippy --workspace --all-targets -- -D warnings

  - name: test
    image: rust:1.93-slim-bookworm
    volumes:
      - name: cargo-registry
        path: /usr/local/cargo/registry
      - name: cargo-git
        path: /usr/local/cargo/git
      - name: cargo-target
        path: /drone/src/target
    environment:
      REDIS_URL: redis://:orka-ci@redis:6379
    commands:
      - apt-get update && apt-get install -y --no-install-recommends pkg-config libssl-dev && rm -rf /var/lib/apt/lists/*
      - cargo test --workspace
    depends_on:
