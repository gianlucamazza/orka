services:
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-orka-dev}
    # ports:
    #   - "6379:6379"  # uncomment for local debugging
    networks:
      - orka-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-orka-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  orka-server:
    build:
      context: .
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-dev}
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - orka-net
    environment:
      ORKA__REDIS__URL: redis://:${REDIS_PASSWORD:-orka-dev}@redis:6379
      ORKA__SERVER__HOST: "0.0.0.0"
      ORKA__ADAPTERS__CUSTOM__HOST: "0.0.0.0"
      ORKA_CONFIG: /etc/orka/orka.toml
      ORKA__WORKSPACE_DIR: /workspaces
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
    volumes:
      - ./workspaces:/workspaces
      - ./orka.toml:/etc/orka/orka.toml:ro
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  orka-net:

volumes:
  redis-data:
