# Orka production-like stack.
#
# Services:
#   redis      — Message bus (Redis Streams) and priority queue (Sorted Sets)
#   qdrant     — Vector store for the knowledge/RAG subsystem
#   orka-server — Main application server (HTTP :8080, custom adapter :8081)
#
# Required environment variables (copy .env.example → .env):
#   ANTHROPIC_API_KEY, OPENAI_API_KEY, REDIS_PASSWORD
#
# Usage:
#   docker compose up -d          # start all services
#   docker compose logs -f        # follow logs
#   docker compose down -v        # stop and remove volumes

services:
  # Redis: used as the message bus (Streams) and priority queue (Sorted Sets).
  # All inter-service messaging flows through Redis.
  redis:
    image: redis:7-alpine
    command: redis-server --requirepass ${REDIS_PASSWORD:-orka-dev}
    # ports:
    #   - "6379:6379"  # uncomment for local debugging
    networks:
      - orka-net
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-orka-dev}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256M

  # Qdrant: vector database for the knowledge/RAG subsystem.
  # orka-server connects to it via gRPC on port 6334.
  qdrant:
    image: qdrant/qdrant:v1.14.0
    networks:
      - orka-net
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-c", ":> /dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 512M

  # orka-server: main application binary.
  # Exposes HTTP API on :8080 (REST + Swagger at /docs) and the custom
  # adapter webhook port on :8081. Depends on both redis and qdrant being healthy.
  orka-server:
    build:
      context: .
      args:
        BUILD_DATE: ${BUILD_DATE:-}
        VCS_REF: ${VCS_REF:-}
        VERSION: ${VERSION:-dev}
    ports:
      - "8080:8080"
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    networks:
      - orka-net
    environment:
      ORKA__REDIS__URL: redis://:${REDIS_PASSWORD:-orka-dev}@redis:6379
      ORKA__SERVER__HOST: "0.0.0.0"
      ORKA__ADAPTERS__CUSTOM__HOST: "0.0.0.0"
      ORKA_CONFIG: /etc/orka/orka.toml
      ORKA__WORKSPACE_DIR: /workspaces
      ORKA__KNOWLEDGE__VECTOR_STORE__URL: http://qdrant:6334
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      BRAVE_API_KEY: ${BRAVE_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ORKA_HOST_HOSTNAME: ${HOSTNAME}
    volumes:
      - ./workspaces:/workspaces
      - ./orka.toml:/etc/orka/orka.toml:ro
      - /etc/os-release:/host/os-release:ro
    healthcheck:
      # Distroless prod image has no curl/wget — disable here.
      # The dev override (docker-compose.override.yml) re-enables it with curl.
      test: ["NONE"]
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    stop_grace_period: 35s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1G

networks:
  orka-net:

volumes:
  redis-data:
  qdrant-data:
