# cargo-release configuration — https://github.com/crate-ci/cargo-release

shared-version = "workspace"
consolidate-commits = true
publish = false
push = false
tag-name = "v{{version}}"
tag-message = "Release {{version}}"
pre-release-commit-message = "release: {{version}}"

# Hooks run once at workspace level before the release commit.
# git-cliff regenerates CHANGELOG.md; sed updates the PKGBUILD version.
pre-release-hook = [
  "bash",
  "-c",
  "cd $(git rev-parse --show-toplevel) && git-cliff --output CHANGELOG.md --tag v{{version}} && sed -i 's/pkgver=.*/pkgver={{version}}/' PKGBUILD",
]
