[package]
name = "custom_skill"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[dependencies]
orka-core = { path = "../../crates/orka-core" }
orka-skills = { path = "../../crates/orka-skills" }

async-trait = "0.1"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"

[[bin]]
name = "custom_skill"
path = "src/main.rs"
