[package]
name = "basic_bot"
version = "0.1.0"
edition = "2024"
rust-version = "1.85"

[dependencies]
orka-core = { path = "../../crates/orka-core" }
orka-adapter-telegram = { path = "../../crates/orka-adapter-telegram" }
orka-skills = { path = "../../crates/orka-skills" }
orka-llm = { path = "../../crates/orka-llm" }

anyhow = "1"
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"

[[bin]]
name = "basic_bot"
path = "src/main.rs"
