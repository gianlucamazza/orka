# This is a configuration file for the bacon tool
#
# Bacon repository: https://github.com/Canop/bacon
# Complete help on configuration: https://dystroy.org/bacon/config/
# You can also check bacon's own bacon.toml file
#
# This file should safely be committed to your repository.

default_job = "check"

[jobs.check]
command = [
  "cargo",
  "check",
  "--workspace",
  "--all-targets",
  "--color",
  "always",
]
need_stdout = false

[jobs.check-all]
command = [
  "cargo",
  "check",
  "--workspace",
  "--all-targets",
  "--all-features",
  "--color",
  "always",
]
need_stdout = false

[jobs.clippy]
command = [
  "cargo",
  "clippy",
  "--workspace",
  "--all-targets",
  "--color",
  "always",
]
need_stdout = false

[jobs.clippy-all]
command = [
  "cargo",
  "clippy",
  "--workspace",
  "--all-targets",
  "--all-features",
  "--color",
  "always",
]
need_stdout = false

[jobs.test]
command = [
  "cargo",
  "test",
  "--workspace",
  "--color",
  "always",
  "--",
  "--color",
  "always",
  "--quiet",
]
need_stdout = true

[jobs.test-doc]
command = [
  "cargo",
  "test",
  "--workspace",
  "--doc",
  "--color",
  "always",
  "--",
  "--color",
  "always",
]
need_stdout = true

[jobs.doc]
command = ["cargo", "doc", "--workspace", "--no-deps", "--color", "always"]
need_stdout = false

[jobs.doc-open]
command = [
  "cargo",
  "doc",
  "--workspace",
  "--no-deps",
  "--open",
  "--color",
  "always",
]
need_stdout = false

[jobs.run]
command = ["cargo", "run", "--color", "always"]
need_stdout = true
allow_warnings = true
background = false
env.RUST_LOG = "debug"

[keybindings]
c = "job:clippy-all"
t = "job:test"
d = "job:doc-open"
w = "job:check-all"
r = "job:run"
