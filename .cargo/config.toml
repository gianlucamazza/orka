# Use clang as the linker driver with mold as the linker backend.
# mold is significantly faster than the system linker (ld/lld) for incremental builds.
[target.x86_64-unknown-linux-gnu]
linker = "clang"
rustflags = ["-C", "link-arg=-fuse-ld=mold"]

[target.aarch64-unknown-linux-gnu]
linker = "aarch64-linux-gnu-gcc"

[alias]
# Run tests including integration tests (mirrors CI)
test-all = "test --workspace -- --include-ignored"
# Check with all features enabled
check-all = "check --workspace --all-features"
# Clippy with all targets and features
lint = "clippy --workspace --all-targets -- -D warnings"
