# systemd drop-in override for orka-server when sudo is enabled.
# Installed by scripts/install.sh when [os.sudo] enabled = true.
# Relaxes security directives that are incompatible with sudo.

[Service]
NoNewPrivileges=no
RestrictSUIDSGID=no
# Reset syscall filter: allow @privileged (needed for setuid via sudo)
SystemCallFilter=
SystemCallFilter=@system-service
