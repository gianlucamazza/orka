services:
  redis:
    ports:
      - "6379:6379"

  qdrant:
    ports:
      - "6333:6333"
      - "6334:6334"

  orka-server:
    build:
      context: .
      target: dev
    deploy:
      resources:
        limits:
          memory: 4G
    volumes:
      - .:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target-cache:/app/target
      - /etc/os-release:/host/os-release:ro
    environment:
      ORKA_HOST_HOSTNAME: ${HOSTNAME}
      RUST_LOG: info,orka_server=debug,orka_core=debug,orka_worker=debug,orka_llm=debug,orka_adapter_custom=debug,orka_bus=debug,orka_memory=debug,orka_observe=debug,orka_auth=debug,orka_skills=debug,orka_web=debug,orka_mcp=debug,orka_router=debug,orka_session=debug,orka_workspace=debug
      RUST_BACKTRACE: 1
    read_only: false
    develop:
      watch:
        - action: rebuild
          path: ./crates
        - action: rebuild
          path: ./orka-server
        - action: sync+restart
          path: ./orka.toml
          target: /etc/orka/orka.toml

volumes:
  cargo-registry:
  cargo-git:
  target-cache:
