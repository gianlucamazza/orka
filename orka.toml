config_version = 2

workspace_dir = "."
# default_workspace = "default"
# [[workspaces]]
# name = "default"
# dir = "workspaces/default"

[server]
host = "127.0.0.1"
port = 8080

[bus]
backend = "redis"
# block_ms = 5000                       # XREADGROUP BLOCK timeout (ms)
# batch_size = 10                       # messages per read batch
# backoff_initial_secs = 1              # reconnection backoff start
# backoff_max_secs = 30                 # reconnection backoff cap

[redis]
url = "redis://127.0.0.1:6379"

[logging]
level = "info"
json = false

[adapters.custom]
host = "127.0.0.1"
port = 8081
# workspace = "default"                 # workspace override for this adapter

# [adapters.telegram]
# bot_token_secret = "adapters/telegram"
# workspace = "default"
# mode = "polling"              # "polling" (default) or "webhook"
# webhook_url = "https://example.com/telegram/webhook"
# webhook_port = 8443
# parse_mode = "HTML"           # "HTML" (default), "MarkdownV2", "none"
# streaming = false
# owner_id = 123456789          # restrict access: only this user ID can interact
# allowed_users = [111, 222]    # additional allowed user IDs (combined with owner_id)

# [adapters.discord]
# bot_token_secret = "adapters/discord"
# application_id = "123456789"
# workspace = "default"

# [adapters.slack]
# bot_token_secret = "adapters/slack"
# listen_port = 3000
# workspace = "default"

# [adapters.whatsapp]
# access_token_secret = "adapters/whatsapp"
# phone_number_id = "123456789"
# verify_token_secret = "adapters/whatsapp-verify"
# listen_port = 3001
# workspace = "default"

# [a2a]
# enabled = false
# url = "https://my-agent.example.com"  # public URL for A2A discovery

[gateway]
rate_limit = 60       # max messages per 60s window per session
dedup_ttl_secs = 3600 # duplicate message detection window

[observe]
backend = "log" # "log" | "redis" | "otel"
# batch_size = 50
# flush_interval_ms = 100

# [[mcp.servers]]
# name = "example"
# command = "npx"
# args = ["-y", "@example/mcp-server"]
# env = { "KEY" = "value" }             # environment variables for the MCP server process

# [mcp.serve]
# enabled = false
# transport = "stdio"                   # "stdio" or "sse"
# sse_port = 3002

[worker]
concurrency = 4
# retry_base_delay_ms = 5000

[memory]
max_entries = 10000
# backend = "auto"                      # "redis", "memory", or "auto" (follows bus.backend)

[secrets]
# encryption_key_env = "ORKA_ENCRYPTION_KEY"

[auth]
enabled = false
api_key_header = "X-Api-Key"
api_keys = []
# [[auth.api_keys]]
# name = "my-service"
# key_hash = "sha256:..."               # SHA-256 hash of the API key
# scopes = ["read", "write"]            # optional scope restrictions

# [auth.jwt]
# issuer = "https://auth.example.com"
# audience = "orka"
# jwks_uri = "https://auth.example.com/.well-known/jwks.json"
# secret = "hs256-secret-for-dev-only"

[sandbox]
backend = "process"

[sandbox.limits]
timeout_secs = 30
max_memory_bytes = 67108864
max_output_bytes = 1048576

[session]
ttl_secs = 86400
# backend = "auto"                      # "redis", "memory", or "auto" (follows bus.backend)

[queue]
max_retries = 3
# backend = "auto"                      # "redis", "memory", or "auto" (follows bus.backend)

[agent]
id = "orka-default"
display_name = "Orka"
timezone = "Europe/Rome"
max_iterations = 15
# model = "claude-opus-4-6"                         # use Opus for complex reasoning
# model = "claude-sonnet-4-6"                       # default — best cost/quality balance
# max_tokens = 4096                                 # override [llm] default max_tokens
# context_window_tokens = 200000
# max_tokens_per_session = 1000000
heartbeat_interval_secs = 30
# summarization_model = "claude-haiku-4-5-20251001" # cheaper model for history summarization
# summarization_threshold = 100
# max_history_entries = 50              # max conversation turns kept in context
# max_tool_result_chars = 50000         # truncation limit for tool output
# skill_timeout_secs = 120              # per-skill execution timeout
# max_tool_retries = 2                  # retries before self-correction hint
# temperature = 0.7                     # LLM sampling temperature (0.0–2.0)
# thinking_budget_tokens = 10000        # Anthropic extended thinking budget
# reasoning_effort = "medium"           # OpenAI o-series: "low", "medium", "high"

[tools]
disabled = ["echo"]

[llm]
timeout_secs = 120
max_tokens = 8192
# model = "claude-sonnet-4-6"           # global default model (providers override)
# context_window_tokens = 1000000
# max_retries = 2
# api_version = "2023-06-01"

[[llm.providers]]
name = "anthropic"
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key_env = "ANTHROPIC_API_KEY"
api_key_secret = "llm/anthropic"
prefixes = ["claude"]
# cost_per_1k_input_tokens = 0.003    # Sonnet 4.6
# cost_per_1k_output_tokens = 0.015   # Sonnet 4.6

[[llm.providers]]
name = "openai"
provider = "openai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"
api_key_secret = "llm/openai"
prefixes = ["gpt", "o3", "o4"]
# cost_per_1k_input_tokens = 0.002    # o3
# cost_per_1k_output_tokens = 0.008   # o3

# [[llm.providers]]
# name = "ollama"
# provider = "openai"
# model = "llama3"
# base_url = "http://localhost:11434/v1"
# prefixes = ["llama", "mistral", "qwen", "gemma"]

[web]
search_provider = "tavily"
api_key_env = "TAVILY_API_KEY"
# max_results = 5
# max_read_chars = 20000
# max_content_chars = 8000              # truncated content limit per page
# cache_ttl_secs = 3600
# read_timeout_secs = 15
# user_agent = "Orka/<version> (Web Agent)"
# searxng_base_url = "http://localhost:8080"

[os]
enabled = true
permission_level = "admin"
# Skill permission level. Levels (least → most permissive):
#   read-only  – fs reads, process/env/network info, package queries, systemd status/journal
#   interact   – adds clipboard read/write and desktop notifications
#   write      – adds filesystem writes
#   execute    – adds shell execution, process signals, file watching, desktop open/screenshot
#   admin      – adds sudo operations: package install, service control
# Filesystem paths the agent is permitted to access.
# NOTE: paths under /home require the fs.conf systemd drop-in (installed
# automatically by install.sh when /home is listed here).
# allowed_paths = ["/home", "/tmp"]
# blocked_paths = ["/etc/shadow", "/etc/gshadow", "~/.ssh/id_*"]
# blocked_commands = ["rm -rf /", "dd", "mkfs", "fdisk"]
# max_file_size_bytes = 10485760
# shell_timeout_secs = 30
# max_output_bytes = 1048576
# max_list_entries = 1000
# allowed_commands = []                 # explicit allow-list (empty = all non-blocked allowed)
# sensitive_env_patterns = ["*_KEY", "*_SECRET", "*_TOKEN", "*_PASSWORD"]

[os.sudo]
enabled = true
allowed_commands = ["systemctl restart", "systemctl stop", "systemctl start"]
require_confirmation = true
confirmation_timeout_secs = 120
sudo_path = "/usr/bin/sudo"
# Package manager commands are added automatically by scripts/install.sh
# based on detected distro (pacman, apt-get, dnf, zypper, apk)

[http]
enabled = true
# max_response_bytes = 1048576
# default_timeout_secs = 30
# blocked_domains = ["169.254.169.254"]
# user_agent = "Orka/<version>"

# [http.webhooks]
# enabled = false
# base_url = "http://localhost:8080"
# path_prefix = "/webhooks"

[knowledge]
enabled = true

[knowledge.vector_store]
provider = "qdrant"
url = "http://localhost:6334"
collection_prefix = "orka_"
default_collection = "default"

[knowledge.embeddings]
provider = "local"
model = "BAAI/bge-small-en-v1.5"
dimensions = 384

[knowledge.chunking]
chunk_size = 1000
chunk_overlap = 200

[scheduler]
enabled = true
poll_interval_secs = 5
max_concurrent = 4

[plugins]
# dir = "plugins"

# [guardrails]
# blocked_keywords = ["password", "secret"]
# block_patterns = ["(?i)password\\s*[:=]"]
# pii_filter = true
# [[guardrails.redact_patterns]]
# pattern = "\\b[A-Z]{2}\\d{6,}\\b"
# replacement = "[REDACTED_ID]"

