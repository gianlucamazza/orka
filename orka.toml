config_version = 5

workspace_dir = "."
# default_workspace = "default"
# [[workspaces]]
# name = "default"
# dir = "workspaces/default"

[server]
host = "127.0.0.1"
port = 8080

[bus]
backend = "redis"
# block_ms = 5000                       # XREADGROUP BLOCK timeout (ms)
# batch_size = 10                       # messages per read batch
# backoff_initial_secs = 1              # reconnection backoff start
# backoff_max_secs = 30                 # reconnection backoff cap

[redis]
url = "redis://127.0.0.1:6379"

[logging]
level = "info"
json = false

[adapters.custom]
host = "127.0.0.1"
port = 8081
# webhook_path = "/webhook"
# bearer_token_secret = "adapters/custom-bearer"
# workspace = "default"                 # workspace override for this adapter

# [adapters.telegram]
# bot_token_secret = "adapters/telegram"
# workspace = "default"
# mode = "polling"              # "polling" (default) or "webhook"
# webhook_url = "https://example.com/telegram/webhook"
# webhook_port = 8443
# parse_mode = "HTML"           # "HTML" (default), "MarkdownV2", "none"
# streaming = false

# [adapters.discord]
# bot_token_secret = "adapters/discord"
# workspace = "default"

# [adapters.slack]
# bot_token_secret = "adapters/slack"
# signing_secret_path = "adapters/slack-signing"
# port = 3000
# workspace = "default"

# [adapters.whatsapp]
# access_token_secret = "adapters/whatsapp"
# app_secret_path = "adapters/whatsapp-app"
# phone_number_id = "123456789"
# business_account_id = "123456789"
# verify_token = "change-me"
# port = 3001
# workspace = "default"

# [a2a]
# discovery_enabled = false
# discovery_interval_secs = 300
# known_agents = ["https://peer.example.com"]

[gateway]
rate_limit = 60       # max messages per 60s window per session
dedup_ttl_secs = 3600 # duplicate message detection window

[observe]
enabled = false
backend = "stdout" # "stdout" | "prometheus" | "otlp"
# otlp_endpoint = "http://127.0.0.1:4317"
# batch_size = 50
# flush_interval_ms = 100

# [[mcp.servers]]
# name = "example"
# command = "npx"
# args = ["-y", "@example/mcp-server"]
# env = { "KEY" = "value" }             # environment variables for the MCP server process

# Optional: expose Claude Code MCP tools (Read, Edit, Bash, etc.) directly.
# Leave this disabled by default when using `coding_delegate` as the public coding surface.
# [[mcp.servers]]
# name = "claude-code"
# command = "/home/gianluca/.local/bin/claude"
# args = ["mcp", "serve"]

[worker]
concurrency = 4
# retry_base_delay_ms = 5000

[memory]
max_entries = 10000
# backend = "auto"                      # "redis", "memory", or "auto" (follows bus.backend)

[secrets]
# encryption_key_env = "ORKA_ENCRYPTION_KEY"

[auth]
api_keys = []
# [[auth.api_keys]]
# name = "my-service"
# key_hash = "sha256:..."               # SHA-256 hash of the API key
# scopes = ["read", "write"]            # optional scope restrictions

# [auth.jwt]
# issuer = "https://auth.example.com"
# audience = "orka"
# public_key_path = "/etc/orka/jwt-public.pem"
# secret = "hs256-secret-for-dev-only"

[sandbox]
backend = "process"

[sandbox.limits]
timeout_secs = 30
max_memory_bytes = 67108864
max_output_bytes = 1048576

[session]
ttl_secs = 86400
# backend = "auto"                      # "redis", "memory", or "auto" (follows bus.backend)

[queue]
max_retries = 3
# backend = "auto"                      # "redis", "memory", or "auto" (follows bus.backend)

[[agents]]
id = "orka-default"
name = "Orka"
max_iterations = 15
# system_prompt = ""
# model = "claude-sonnet-4-6"
# temperature = 0.7
# max_tokens = 4096
# tool_result_max_chars = 50000
# allowed_tools = []
# denied_tools = []

[graph]
# execution_mode = "sequential"
# max_hops = 10

[tools]
deny = ["echo"]

[llm]
default_model = "claude-sonnet-4-6"
default_temperature = 0.7
default_max_tokens = 8192

[[llm.providers]]
name = "anthropic"
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key_env = "ANTHROPIC_API_KEY"
api_key_secret = "llm/anthropic"
# cost_per_1k_input_tokens = 0.003    # Sonnet 4.6
# cost_per_1k_output_tokens = 0.015   # Sonnet 4.6

[[llm.providers]]
name = "openai"
provider = "openai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"
api_key_secret = "llm/openai"
# cost_per_1k_input_tokens = 0.002    # o3
# cost_per_1k_output_tokens = 0.008   # o3

# [[llm.providers]]
# name = "ollama"
# provider = "ollama"
# model = "llama3"
# base_url = "http://localhost:11434/v1"

[web]
search_provider = "tavily"
api_key_env = "TAVILY_API_KEY"
# max_results = 5
# max_read_chars = 20000
# max_content_chars = 8000              # truncated content limit per page
# cache_ttl_secs = 3600
# read_timeout_secs = 15
# user_agent = "Orka/<version> (Web Agent)"
# searxng_base_url = "http://localhost:8080"

[os]
enabled = true
permission_level = "admin"
# Skill permission level. Levels (least → most permissive):
#   read-only  – fs reads, process/env/network info, package queries, systemd status/journal
#   interact   – adds clipboard read/write and desktop notifications
#   write      – adds filesystem writes
#   execute    – adds shell execution, process signals, file watching, desktop open/screenshot
#   admin      – adds sudo operations: package install, service control
# Filesystem paths the agent is permitted to access.
# NOTE: paths under /home require the fs.conf systemd drop-in (installed
# automatically by install.sh when /home is listed here).
# allowed_paths = ["/home", "/tmp"]
# denied_paths = ["/etc/shadow", "/etc/gshadow", "~/.ssh/id_*"]
# allowed_shell_commands = []           # explicit allow-list; empty means unrestricted

# Delegate complete coding tasks through Orka's coding router.
[os.coding]
enabled = false
default_provider = "auto"         # "auto" | "claude_code" | "codex"
selection_policy = "availability" # "availability" | "prefer_claude" | "prefer_codex"
inject_workspace_context = true
require_verification = false
allow_working_dir_override = true

# [os.coding.providers.claude_code]
# enabled = true
# executable_path = "/usr/bin/claude"
# model = "claude-sonnet-4-6"
# max_turns = 10
# timeout_secs = 300
# append_system_prompt = "Respect the repository architecture. No workaround layers."
# allowed_tools = ["Read", "Edit", "Bash(git *)"]
# allow_file_modifications = true
# allow_command_execution = true

# [os.coding.providers.codex]
# enabled = true
# executable_path = "/usr/local/bin/codex"
# model = "gpt-5-codex"
# timeout_secs = 300
# sandbox_mode = "workspace-write"      # "read-only" | "workspace-write" | "danger-full-access"
# approval_policy = "never"             # "untrusted" | "on-failure" | "on-request" | "never"
# allow_file_modifications = true
# allow_command_execution = true

[os.sudo]
allowed = true
allowed_commands = ["systemctl restart", "systemctl stop", "systemctl start"]
password_required = true
# Package manager commands are added automatically by scripts/install.sh
# based on detected distro (pacman, apt-get, dnf, zypper, apk)

[http]
timeout_secs = 30
max_redirects = 10
# user_agent = "Orka/<version>"
# default_headers = [["X-App", "orka"]]

[knowledge]
enabled = true

[knowledge.vector_store]
provider = "qdrant"
url = "http://localhost:6334"
collection_prefix = "orka_"
default_collection = "default"

[knowledge.embeddings]
provider = "local"
model = "BAAI/bge-small-en-v1.5"
dimensions = 384

[knowledge.chunking]
chunk_size = 1000
chunk_overlap = 200

[scheduler]
enabled = true

[plugins]
# dir = "plugins"

