config_version = 1

[server]
host = "127.0.0.1"
port = 8080

[bus]
backend = "redis"

[redis]
url = "redis://127.0.0.1:6379"

[logging]
level = "info"
json = false

workspace_dir = "."

[adapters.custom]
host = "127.0.0.1"
port = 8081

# [adapters.telegram]
# bot_token_secret = "adapters/telegram"

# [adapters.discord]
# bot_token_secret = "adapters/discord"

# [adapters.slack]
# bot_token_secret = "adapters/slack"
# listen_port = 3000

# [adapters.whatsapp]
# access_token_secret = "adapters/whatsapp"
# phone_number_id = "123456789"
# verify_token_secret = "adapters/whatsapp-verify"
# listen_port = 3001

[gateway]
rate_limit = 60       # max messages per 60s window per session
dedup_ttl_secs = 3600 # duplicate message detection window

[observe]
backend = "log" # "log" | "redis" | "otel"
# batch_size = 50
# flush_interval_ms = 100

# [[mcp.servers]]
# name = "example"
# command = "npx"
# args = ["-y", "@example/mcp-server"]

[worker]
concurrency = 4
# retry_base_delay_ms = 5000

[memory]
max_entries = 10000

[secrets]
# encryption_key_env = "ORKA_ENCRYPTION_KEY"

[auth]
enabled = false
api_key_header = "X-Api-Key"
api_keys = []

# [auth.jwt]
# issuer = "https://auth.example.com"
# audience = "orka"
# jwks_uri = "https://auth.example.com/.well-known/jwks.json"
# secret = "hs256-secret-for-dev-only"

[sandbox]
backend = "process"

[sandbox.limits]
timeout_secs = 30
max_memory_bytes = 67108864
max_output_bytes = 1048576

[session]
ttl_secs = 86400

[queue]
max_retries = 3

[agent]
id = "orka-default"
display_name = "Orka"
timezone = "Europe/Rome"
max_iterations = 15
# model = "claude-sonnet-4-6"      # override [llm] default model for this agent
# max_tokens = 4096                 # override [llm] default max_tokens
# context_window_tokens = 200000
# max_tokens_per_session = 1000000
heartbeat_interval_secs = 30
# summarization_model = "claude-haiku-4-5-20251001"
# summarization_threshold = 100

[tools]
disabled = ["echo"]

[llm]
timeout_secs = 120
max_tokens = 8192
# context_window_tokens = 1000000
# max_retries = 2
# api_version = "2023-06-01"

[[llm.providers]]
name = "anthropic"
provider = "anthropic"
model = "claude-sonnet-4-6"
api_key_env = "ANTHROPIC_API_KEY"
api_key_secret = "llm/anthropic"

[[llm.providers]]
name = "openai"
provider = "openai"
model = "gpt-5-mini"
api_key_env = "OPENAI_API_KEY"
api_key_secret = "llm/openai"

# [[llm.providers]]
# name = "ollama"
# provider = "openai"
# model = "llama3"
# base_url = "http://localhost:11434/v1"

[web]
search_provider = "tavily"
api_key_env = "TAVILY_API_KEY"
# max_results = 5
# max_read_chars = 20000
# cache_ttl_secs = 3600
# read_timeout_secs = 15
# user_agent = "Orka/0.1 (Web Agent)"
# searxng_base_url = "http://localhost:8080"

[os]
enabled = true
permission_level = "admin"
# allowed_paths = ["/home", "/tmp"]
# blocked_paths = ["/etc/shadow", "/etc/gshadow", "~/.ssh/id_*"]
# blocked_commands = ["rm -rf /", "dd", "mkfs", "fdisk"]
# max_file_size_bytes = 10485760
# shell_timeout_secs = 30
# max_output_bytes = 1048576
# max_list_entries = 1000

[os.sudo]
enabled = true
allowed_commands = ["systemctl restart", "systemctl stop", "systemctl start"]
require_confirmation = true
confirmation_timeout_secs = 120
sudo_path = "/usr/bin/sudo"
# Package manager commands are added automatically by scripts/install.sh
# based on detected distro (pacman, apt-get, dnf, zypper, apk)

[http]
enabled = true
# max_response_bytes = 1048576
# default_timeout_secs = 30
# blocked_domains = ["169.254.169.254"]
# user_agent = "Orka/0.1"

# [http.webhooks]
# enabled = false
# base_url = "http://localhost:8080"
# path_prefix = "/webhooks"

[knowledge]
enabled = true

[knowledge.vector_store]
provider = "qdrant"
url = "http://localhost:6334"
collection_prefix = "orka_"
default_collection = "default"

[knowledge.embeddings]
provider = "local"
model = "BAAI/bge-small-en-v1.5"
dimensions = 384

[knowledge.chunking]
chunk_size = 1000
chunk_overlap = 200

[scheduler]
enabled = true
poll_interval_secs = 5
max_concurrent = 4

[plugins]
# dir = "plugins"

